services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TEMPLATES_DIR: /data/templates
      OUTPUTS_DIR: /data/outputs
    volumes:
      - ./data/templates:/data/templates
      - ./data/outputs:/data/outputs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
