name: CI

on:
  push:
    branches:
      - main
      - dev
      - test
  pull_request:
    branches:
      - main
      - dev
      - test

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  quality-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run quality contracts
        run: python scripts/run_quality_contracts.py

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Run frontend verification
        run: yarn verify

  frontend-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend smoke tests
        run: yarn test:smoke

  deploy-timeweb:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs:
      - backend
      - quality-contracts
      - frontend
      - frontend-smoke
    runs-on: ubuntu-latest
    environment: timeweb-production

    steps:
      - name: Deploy to Timeweb server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/a3presentation
            git fetch origin
            git checkout dev
            git reset --hard origin/dev
            bash scripts/deploy_server.sh
            curl -fsS http://127.0.0.1:8080/api/health
